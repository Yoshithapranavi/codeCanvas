        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function renderProblems() {
            const topic = getQueryParam('topic');
            const contentDiv = document.getElementById('content');

            if (!topic || !problemDatabase[topic]) {
                contentDiv.innerHTML = `
                    <div class="not-found">
                        <h2>Topic Not Found</h2>
                        <p>The topic "${topic}" doesn't exist. Please select a valid topic from the roadmap.</p>
                        <a href="structured-roadmap.html" class="back-btn">Back to Roadmap</a>
                    </div>
                `;
                return;
            }

            const problems = problemDatabase[topic];
            let html = `
                <div class="header">
                    <h1>${topic} Problems</h1>
                    <p>Master ${topic} with curated learning resources for each problem</p>
                    <a href="structured-roadmap.html" class="back-btn">← Back to Roadmap</a>
                </div>
                <div class="problems-grid">
            `;

            problems.forEach(problem => {
                html += `
                    <div class="problem-card">
                        <h3>${problem.name}</h3>
                        <p>${problem.description}</p>
                        <div class="resource-links">
                            <a href="${problem.leetcode}" target="_blank" rel="noopener" class="resource-btn leetcode-btn">🔗 LeetCode</a>
                            <a href="${problem.geeksforgeeks}" target="_blank" rel="noopener" class="resource-btn geeksforgeeks-btn">🔗 GeeksforGeeks</a>
                            <a href="${problem.youtube}" target="_blank" rel="noopener" class="resource-btn youtube-btn">▶ YouTube</a>
                            <a href="${problem.interviewbit}" target="_blank" rel="noopener" class="resource-btn interviewbit-btn">🔗 InterviewBit</a>
                        </div>
                        <div class="tips-section">
                            <strong>💡 Key Tip:</strong> ${problem.tips}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            contentDiv.innerHTML = html;
        }

        // Render problems when page loads
        document.addEventListener('DOMContentLoaded', renderProblems);
    </script>
